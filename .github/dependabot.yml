version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependabot"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/contracts/solidity-baseline"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependabot"
      - "contracts"
